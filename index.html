        function renderCards(data) {
            const container = document.getElementById('qaContainer');
            container.innerHTML = '';

            if(data.length === 0) {
                container.innerHTML = `<div class="text-center py-8 text-slate-400 text-sm">ไม่พบข้อมูลคำถามในหมวดหมู่ที่เลือก</div>`;
                return;
            }

            data.forEach(item => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden transition-all duration-200 hover:shadow-md";
                card.innerHTML = `
                    <div class="bg-slate-50 px-5 py-3.5 border-b border-slate-100 flex justify-between items-center gap-3">
                        <span class="font-medium text-slate-800 text-sm sm:text-base">🙋 ${item.question}</span>
                        <span class="text-[10px] bg-teal-50 text-teal-700 px-2 py-0.5 rounded font-medium shrink-0 uppercase tracking-wider">${item.category}</span>
                    </div>
                    <div class="p-5 space-y-4">
                        <textarea id="hidden-textarea-${item.id}" style="position:absolute; left:-9999px; top:-9999px;">${item.answer}</textarea>
                        <div class="bg-slate-900 text-slate-100 p-4 rounded-xl text-xs sm:text-sm whitespace-pre-line leading-relaxed overflow-x-auto select-all" id="text-${item.id}">${item.answer}</div>
                        <button onclick="copyToClipboard(${item.id})" class="w-full bg-teal-50 hover:bg-teal-100 text-teal-700 font-medium py-2.5 px-4 rounded-xl text-sm transition-colors flex items-center justify-center gap-2 outline-none focus:ring-2 focus:ring-teal-500">
                            📋 คัดลอกข้อความไปตอบแชท
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function filterQuestions() {
            const select = document.getElementById('categorySelect');
            const selectedValue = select.value;

            if(selectedValue === 'all') {
                renderCards(qaData);
            } else {
                const filtered = qaData.filter(item => item.category === selectedValue);
                renderCards(filtered);
            }
        }

        // ฟังก์ชันระบบคัดลอกข้อความเวอร์ชันอัปเกรดใหม่ ทลายกำแพงระบบ Security ของไฟล์เครื่อง
        function copyToClipboard(id) {
            const hiddenTextArea = document.getElementById(`hidden-textarea-${id}`);
            
            // ใช้เทคนิคย้าย Focus และสั่งไฮไลท์ข้อความในวัตถุจำลอง จากนั้นก๊อปปี้ผ่านคำสั่งระบบเก่า
            hiddenTextArea.select();
            hiddenTextArea.setSelectionRange(0, 99999); // รองรับสำหรับมือถือ

            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    showToast();
                    return;
                }
            } catch (err) {
                console.log("ExecCommand Failed, trying Clipboard API...");
            }

            // หากวิธีแรกไม่ผ่าน (กรณีเบราว์เซอร์ล้ำมากๆ) จะรันระบบปกติสำรองให้
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(hiddenTextArea.value).then(() => {
                    showToast();
                });
            } else {
                // หากพลาดหมดจริงๆ จะแจ้งเตือนให้แตะค้างที่กล่องดำ
                alert('โปรดใช้นิ้วแตะค้างที่กล่องข้อความสีดำ เพื่อกดคัดลอกด้วยตนเองค่ะ');
            }
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-2');
            toast.classList.add('opacity-100', 'translate-y-0');
            
            setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', 'pointer-events-none', 'translate-y-2');
            }, 2000);
        }

        document.addEventListener("DOMContentLoaded", function() {
            renderCards(qaData);
        });
    </script>
